# Schematix reverse proxy — drop-in nginx config.
#
# Usage:
#   1. Replace `schematix.example.com` with your real domain.
#   2. Get a free TLS cert: `certbot --nginx -d schematix.example.com`
#   3. Test config:  nginx -t
#   4. Reload:       systemctl reload nginx
#
# Or use this directly inside docker-compose by uncommenting the `nginx`
# service in docker-compose.yml.

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name schematix.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name schematix.example.com;

    # ── TLS ──────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/schematix.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schematix.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Upload size (STL files / images) ─────────────────────────────
    client_max_body_size 50M;

    # ── Performance ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Cache static frontend assets
    location ~* \.(css|js|woff2?|svg|png|jpg|jpeg|webp)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Long timeouts — Gemini grounded search can take ~30s.
    proxy_read_timeout    120s;
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;

    # ── Reverse proxy → Schematix uvicorn ────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # ── Health check (no log) ────────────────────────────────────────
    location = /api/health {
        proxy_pass http://127.0.0.1:8000/api/health;
        access_log off;
    }
}
